name: Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'
          cache: pip

      - name: Stamp version
        shell: pwsh
        run: |
          $ver = "${{ github.ref_name }}".TrimStart('v')
          Set-Content version.py "__version__ = '$ver'"
          echo "VERSION=$ver" >> $env:GITHUB_ENV

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build sqlcipher3 static
        env:
          SQLCIPHER_STATIC: "1"
        run: pip install --no-binary sqlcipher3 sqlcipher3

      - name: Verify pywebview imports cleanly (build-time guard)
        # If `import webview` fails, PyInstaller's collect_submodules('webview')
        # silently returns [] and the resulting exe crashes at start() with no
        # log. Fail loudly here instead of shipping a broken installer.
        shell: pwsh
        run: |
          python -c "import webview; print('webview import OK')"
          python -c "import proxy_tools; print('proxy_tools OK')"
          python -c "import bottle; print('bottle OK')"
          python -c "import clr; print('clr OK')"

      - name: Build with PyInstaller
        run: pyinstaller --clean app.spec

      - name: Install Inno Setup
        run: choco install innosetup --yes --no-progress

      - name: Compile installer
        shell: pwsh
        run: |
          & "C:\Program Files (x86)\Inno Setup 6\ISCC.exe" /DAppVersion=$env:VERSION installer\windows\boxcutter.iss

      # The installer is uploaded twice: once as a workflow artifact so the
      # bundle-smoke-windows job can install it for testing in this same run,
      # and once as a Release asset for end users. Without the workflow-artifact
      # copy, the smoke gate would have to round-trip through gh release
      # download — which would only work AFTER the asset is published, defeating
      # the purpose of a pre-publish gate.
      - name: Upload installer (workflow artifact for smoke gate)
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-installer
          path: installer\windows\Output\BoxCutter-Setup-${{ env.VERSION }}.exe
          retention-days: 1
          if-no-files-found: error

      - name: Upload installer (Release asset)
        uses: softprops/action-gh-release@v2
        with:
          files: installer\windows\Output\BoxCutter-Setup-${{ env.VERSION }}.exe

      # Unpacked PyInstaller bundle for smoke gate (skip Inno Setup install)
      - name: Upload unpacked Windows bundle (workflow artifact for smoke)
        uses: actions/upload-artifact@v4
        with:
          name: release-windows-bundle
          path: dist/BoxCutter
          retention-days: 1
          if-no-files-found: error

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: '3.11'

      - name: Stamp version
        run: |
          ver="${{ github.ref_name }}"
          ver="${ver#v}"
          echo "__version__ = '$ver'" > version.py
          echo "VERSION=$ver" >> "$GITHUB_ENV"

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Install sqlcipher via Homebrew
        run: brew install sqlcipher

      - name: Build sqlcipher3
        env:
          SQLCIPHER_PATH: /usr/local/opt/sqlcipher
        run: pip install sqlcipher3

      - name: Verify pywebview imports cleanly (build-time guard)
        run: |
          python -c "import webview; print('webview import OK')"
          python -c "import proxy_tools; print('proxy_tools OK')"
          python -c "import bottle; print('bottle OK')"

      - name: Generate macOS icon
        run: iconutil -c icns assets/icons/icon.iconset -o static/boxcutter.icns

      - name: Build app bundle
        run: pyinstaller --clean app.spec

      - name: Create DMG
        run: |
          npm install -g create-dmg
          create-dmg dist/BoxCutter.app dist/ || true
          mv dist/*.dmg dist/boxcutter-mac.dmg

      - name: Upload DMG (workflow artifact for smoke gate)
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-dmg
          path: dist/boxcutter-mac.dmg
          retention-days: 1
          if-no-files-found: error

      - name: Upload DMG (Release asset)
        uses: softprops/action-gh-release@v2
        with:
          files: dist/boxcutter-mac.dmg

      # Unpacked .app bundle for smoke gate (skip DMG mount path)
      - name: Upload unpacked .app bundle (workflow artifact for smoke)
        uses: actions/upload-artifact@v4
        with:
          name: release-macos-app
          path: dist/BoxCutter.app
          retention-days: 1
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # bundle-smoke gate — Layers 1/2/3 against the freshly-built artifact
  # before SHA manifest publishes. Failure here means the SHA manifest
  # never gets attached to the Release, which means auto-updater clients
  # cannot verify and refuse to download. A broken bundle physically
  # cannot ship a complete release.
  # ---------------------------------------------------------------------------
  bundle-smoke-windows:
    needs: build-windows
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test dependencies
        run: |
          pip install --no-cache-dir pytest playwright mutagen
          playwright install chromium
        shell: pwsh

      - name: Download unpacked Windows bundle
        uses: actions/download-artifact@v4
        with:
          name: release-windows-bundle
          path: bundle

      - name: Locate bundle exe + scripts
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path bundle -Recurse -Filter "BoxCutter.exe" | Select-Object -First 1
          if (-not $exe) { Write-Error "BoxCutter.exe not found"; exit 1 }
          $bundleRoot = $exe.Directory.FullName
          $scripts = Join-Path $bundleRoot "_internal\scripts"
          if (-not (Test-Path $scripts)) { Write-Error "scripts dir not found"; exit 1 }
          "BOXCUTTER_EXE=$($exe.FullName)" | Out-File $env:GITHUB_ENV -Append
          "BUNDLED_SCRIPTS=$scripts" | Out-File $env:GITHUB_ENV -Append

      - name: Layer 1 — verify_imports
        # Start-Process -Wait — BoxCutter.exe is a windowed PyInstaller build,
        # PowerShell's `&` returns immediately without waiting. We need
        # explicit -Wait + redirected output to run synchronously.
        shell: pwsh
        run: |
          $script = (Resolve-Path tests/bundle/verify_imports.py).Path
          $proc = Start-Process -FilePath $env:BOXCUTTER_EXE `
            -ArgumentList $script `
            -Wait -PassThru -NoNewWindow `
            -RedirectStandardOutput verify_out.txt `
            -RedirectStandardError verify_err.txt
          Get-Content verify_out.txt
          if (Test-Path verify_err.txt -PathType Leaf) { Get-Content verify_err.txt }
          if ($proc.ExitCode -ne 0) { Write-Error "verify_imports failed (exit $($proc.ExitCode))"; exit $proc.ExitCode }

      - name: Layer 2 — run_all_scripts
        shell: pwsh
        run: |
          $script = (Resolve-Path tests/bundle/run_all_scripts.py).Path
          $fixtures = (Resolve-Path tests/bundle/fixtures).Path
          python $script `
            --bundle-exe "$env:BOXCUTTER_EXE" `
            --scripts-dir "$env:BUNDLED_SCRIPTS" `
            --fixtures-dir "$fixtures"
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Layer 3 — Playwright UI contract
        env:
          BOXCUTTER_BUNDLE_EXE: ${{ env.BOXCUTTER_EXE }}
          BOXCUTTER_TESTING: "1"
        shell: pwsh
        run: pytest tests/bundle/ui/ -v --tb=short

  bundle-smoke-macos:
    needs: build-mac
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test dependencies
        run: |
          pip install --no-cache-dir pytest playwright mutagen
          playwright install chromium

      - name: Download unpacked .app bundle
        uses: actions/download-artifact@v4
        with:
          name: release-macos-app
          path: bundle

      - name: Reconstitute .app bundle (artifact download flattens the dir)
        run: |
          if [ -d "bundle/Contents" ]; then
            mkdir -p /tmp/BoxCutter.app
            cp -R bundle/* /tmp/BoxCutter.app/
          else
            inner=$(find bundle -maxdepth 2 -name "Contents" -type d | head -1)
            cp -R "$(dirname "$inner")" /tmp/BoxCutter.app
          fi
          chmod +x /tmp/BoxCutter.app/Contents/MacOS/BoxCutter
          echo "BOXCUTTER_APP=/tmp/BoxCutter.app" >> "$GITHUB_ENV"

      - name: Locate bundle exe + scripts
        run: |
          exe="$BOXCUTTER_APP/Contents/MacOS/BoxCutter"
          if [ ! -x "$exe" ]; then ls -la "$BOXCUTTER_APP/Contents/MacOS"; exit 1; fi
          scripts=""
          for c in \
              "$BOXCUTTER_APP/Contents/Resources/scripts" \
              "$BOXCUTTER_APP/Contents/Frameworks/scripts" \
              "$BOXCUTTER_APP/Contents/MacOS/scripts" \
              "$BOXCUTTER_APP/Contents/Resources/_internal/scripts" \
              "$BOXCUTTER_APP/Contents/MacOS/_internal/scripts"; do
            if [ -d "$c" ]; then scripts="$c"; break; fi
          done
          if [ -z "$scripts" ]; then
            echo "scripts/ not found — dumping layout:"
            find "$BOXCUTTER_APP" -name "strip_comment_urls.py" -type f
            exit 1
          fi
          echo "BOXCUTTER_EXE=$exe" >> "$GITHUB_ENV"
          echo "BUNDLED_SCRIPTS=$scripts" >> "$GITHUB_ENV"

      - name: Layer 1 — verify_imports
        # Absolute path — launcher does os.chdir(_MEIPASS) before
        # resolving sys.argv[1].
        run: |
          script="$(realpath tests/bundle/verify_imports.py)"
          "$BOXCUTTER_EXE" "$script"

      - name: Layer 2 — run_all_scripts
        run: |
          python "$(realpath tests/bundle/run_all_scripts.py)" \
            --bundle-exe "$BOXCUTTER_EXE" \
            --scripts-dir "$BUNDLED_SCRIPTS" \
            --fixtures-dir "$(realpath tests/bundle/fixtures)"

      - name: Layer 3 — Playwright UI contract
        env:
          BOXCUTTER_BUNDLE_EXE: ${{ env.BOXCUTTER_EXE }}
          BOXCUTTER_TESTING: "1"
        run: pytest tests/bundle/ui/ -v --tb=short

  publish-manifest:
    # R-03: hash all release assets in one Linux job and publish SHA256SUMS so
    # the auto-updater can verify integrity of the installer it downloads.
    # Single canonical format = single parser in app.py = smaller attack surface.
    #
    # Gated behind bundle-smoke — if any layer fails on either OS, the
    # SHA manifest never publishes, the Release stays in a half-published
    # state, and the auto-updater refuses to verify (because /SHA256SUMS
    # 404s). A broken bundle physically cannot ship a complete release.
    needs: [bundle-smoke-windows, bundle-smoke-macos]
    runs-on: ubuntu-latest
    steps:
      - name: Download release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          mkdir -p assets
          cd assets
          gh release download "$TAG" \
            --repo "${{ github.repository }}" \
            --pattern '*.exe' \
            --pattern '*.dmg'
          ls -la

      - name: Generate SHA256SUMS
        working-directory: assets
        run: |
          sha256sum * > SHA256SUMS
          cat SHA256SUMS

      - name: Upload manifest to release
        uses: softprops/action-gh-release@v2
        with:
          files: assets/SHA256SUMS
