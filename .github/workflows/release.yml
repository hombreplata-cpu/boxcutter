name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Build sqlcipher3 static
        env:
          SQLCIPHER_STATIC: "1"
        run: pip install --no-binary sqlcipher3 sqlcipher3

      - name: Build exe
        run: pyinstaller app.spec

      - name: Rename artifact
        run: mv dist/rekordbox-tools.exe dist/rekordbox-tools-windows.exe

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/rekordbox-tools-windows.exe

  build-mac:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r requirements.txt pyinstaller

      - name: Install sqlcipher via Homebrew
        run: brew install sqlcipher

      - name: Build sqlcipher3
        env:
          SQLCIPHER_PATH: /usr/local/opt/sqlcipher
        run: pip install sqlcipher3

      - name: Build app bundle
        run: pyinstaller app.spec

      - name: Create DMG
        run: |
          npm install -g create-dmg
          create-dmg dist/rekordbox-tools.app dist/ || true
          mv dist/*.dmg dist/rekordbox-tools-mac.dmg

      - name: Upload to release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/rekordbox-tools-mac.dmg
