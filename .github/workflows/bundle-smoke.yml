name: Bundle Smoke

# Runs the bundle-smoke test contracts against the actual built BoxCutter
# artifact. This is the layer with teeth — source-tree pytest cannot catch
# regressions like REG-001 (mutagen submodules missing) or REG-002 (Quit
# form CSRF), but this workflow can.
#
# Three layers (defined in tests/bundle/):
#   Layer 1 — verify_imports.py: every required package + submodule imports
#             inside the bundled exe.
#   Layer 2 — run_all_scripts.py: every production script loads (no traceback)
#             when invoked through the bundle, plus strip_comment_urls runs
#             end-to-end against the audio fixtures.
#   Layer 3 — tests/bundle/ui/ Playwright suite: every primary page renders
#             with the bc-token meta tag, every DOM form posting to a state-
#             mutating route carries a matching csrf_token (REG-002 guard).
#
# Triggers:
#   workflow_run on Build Test Artifacts completion — runs automatically
#                after every push-to-main build, gating the artifact before
#                anyone sideloads it.
#   workflow_dispatch — manual run against a specific build-test-artifacts
#                run id (or latest if blank). Useful for testing the workflow
#                itself or re-running smoke against an older build.

on:
  workflow_run:
    workflows: ["Build Test Artifacts"]
    types: [completed]
  workflow_dispatch:
    inputs:
      run_id:
        description: 'Build Test Artifacts run ID to smoke. Blank = latest successful on main.'
        required: false
        default: ''

permissions:
  contents: read
  actions: read

concurrency:
  group: bundle-smoke-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ---------------------------------------------------------------------------
  # Resolve which build-test-artifacts run to pull artifacts from.
  # ---------------------------------------------------------------------------
  resolve-source-run:
    runs-on: ubuntu-latest
    outputs:
      source_run_id: ${{ steps.set.outputs.source_run_id }}
      should_run: ${{ steps.set.outputs.should_run }}
    steps:
      - id: set
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          REPO: ${{ github.repository }}
        run: |
          # workflow_run path: gate on the source workflow having succeeded.
          if [ "${{ github.event_name }}" = "workflow_run" ]; then
            if [ "${{ github.event.workflow_run.conclusion }}" != "success" ]; then
              echo "source workflow conclusion was ${{ github.event.workflow_run.conclusion }} — skipping"
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              exit 0
            fi
            echo "source_run_id=${{ github.event.workflow_run.id }}" >> "$GITHUB_OUTPUT"
            echo "should_run=true" >> "$GITHUB_OUTPUT"
            exit 0
          fi

          # workflow_dispatch path: use the supplied run_id, or look up the
          # latest successful run of build-test-artifacts on main.
          input_run_id="${{ github.event.inputs.run_id }}"
          if [ -n "$input_run_id" ]; then
            echo "source_run_id=$input_run_id" >> "$GITHUB_OUTPUT"
          else
            latest=$(gh run list \
              --repo "$REPO" \
              --workflow "Build Test Artifacts" \
              --branch main \
              --status success \
              --limit 1 \
              --json databaseId \
              --jq '.[0].databaseId')
            if [ -z "$latest" ] || [ "$latest" = "null" ]; then
              echo "no successful Build Test Artifacts run found on main"
              echo "should_run=false" >> "$GITHUB_OUTPUT"
              exit 1
            fi
            echo "source_run_id=$latest" >> "$GITHUB_OUTPUT"
          fi
          echo "should_run=true" >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # Windows smoke: install the .exe to %LOCALAPPDATA%, run all 3 layers.
  # ---------------------------------------------------------------------------
  windows-smoke:
    needs: resolve-source-run
    if: needs.resolve-source-run.outputs.should_run == 'true'
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test dependencies
        run: |
          pip install --no-cache-dir pytest playwright mutagen
          playwright install chromium
        shell: pwsh

      # Smoke runs against the unpacked PyInstaller bundle, NOT the Inno
      # Setup installer. The installer's silent-mode hangs in CI for
      # reasons that are independent of bundle correctness; testing the
      # bundle directly is what catches REG-001-class regressions.
      # Installer behaviour gets its own dedicated job in the future.
      - name: Download unpacked Windows bundle
        uses: actions/download-artifact@v4
        with:
          pattern: BoxCutter-bundle-windows-*
          path: bundle
          run-id: ${{ needs.resolve-source-run.outputs.source_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          merge-multiple: true

      - name: Locate bundle exe + scripts
        shell: pwsh
        run: |
          $exe = Get-ChildItem -Path bundle -Recurse -Filter "BoxCutter.exe" | Select-Object -First 1
          if (-not $exe) {
            Write-Error "BoxCutter.exe not found in bundle artifact"
            Get-ChildItem -Recurse bundle | Select-Object -First 30 FullName
            exit 1
          }
          $bundleRoot = $exe.Directory.FullName
          $scripts = Join-Path $bundleRoot "_internal\scripts"
          if (-not (Test-Path $scripts)) {
            Write-Error "scripts/ not found at $scripts — PyInstaller layout changed?"
            Get-ChildItem $bundleRoot
            exit 1
          }
          Write-Host "Bundle exe: $($exe.FullName)"
          Write-Host "Bundle scripts: $scripts"
          "BOXCUTTER_EXE=$($exe.FullName)" | Out-File $env:GITHUB_ENV -Append
          "BUNDLED_SCRIPTS=$scripts" | Out-File $env:GITHUB_ENV -Append

      - name: Layer 1 — verify_imports against bundle
        # Absolute path — the launcher does os.chdir(_MEIPASS) before
        # resolving sys.argv[1].
        # Start-Process -Wait — BoxCutter.exe is a windowed (console=False)
        # PyInstaller build, so PowerShell's `&` returns immediately. We need
        # explicit -Wait + redirected output to actually run synchronously.
        shell: pwsh
        run: |
          $script = (Resolve-Path tests/bundle/verify_imports.py).Path
          $proc = Start-Process -FilePath $env:BOXCUTTER_EXE `
            -ArgumentList $script `
            -Wait -PassThru -NoNewWindow `
            -RedirectStandardOutput verify_out.txt `
            -RedirectStandardError verify_err.txt
          Get-Content verify_out.txt
          if (Test-Path verify_err.txt -PathType Leaf) { Get-Content verify_err.txt }
          if ($proc.ExitCode -ne 0) { Write-Error "verify_imports failed (exit $($proc.ExitCode))"; exit $proc.ExitCode }

      - name: Layer 2 — run_all_scripts against bundle
        shell: pwsh
        run: |
          $script = (Resolve-Path tests/bundle/run_all_scripts.py).Path
          $fixtures = (Resolve-Path tests/bundle/fixtures).Path
          python $script `
            --bundle-exe "$env:BOXCUTTER_EXE" `
            --scripts-dir "$env:BUNDLED_SCRIPTS" `
            --fixtures-dir "$fixtures"
          if ($LASTEXITCODE -ne 0) { Write-Error "run_all_scripts failed"; exit $LASTEXITCODE }

      - name: Probe — does BoxCutter.exe start in TESTING mode?
        # Diagnostic step: surface launcher problems early instead of via
        # Layer 3's generic 'server did not start' error.
        shell: pwsh
        run: |
          $env:BOXCUTTER_PORT = "12345"
          $env:BOXCUTTER_TESTING = "1"
          $proc = Start-Process -FilePath $env:BOXCUTTER_EXE `
            -PassThru -NoNewWindow `
            -RedirectStandardOutput probe_out.log `
            -RedirectStandardError probe_err.log
          for ($i=1; $i -le 15; $i++) {
            Start-Sleep -Seconds 1
            try {
              $resp = Invoke-WebRequest -Uri "http://127.0.0.1:12345/" -UseBasicParsing -TimeoutSec 1
              Write-Host "[probe] OK — server responded on attempt $i (status $($resp.StatusCode))"
              Stop-Process -Id $proc.Id -Force 2>$null
              exit 0
            } catch {}
            if ($proc.HasExited) {
              Write-Host "[probe] Process exited (code $($proc.ExitCode)) before binding port"
              Write-Host "--- stdout ---"; if (Test-Path probe_out.log) { Get-Content probe_out.log }
              Write-Host "--- stderr ---"; if (Test-Path probe_err.log) { Get-Content probe_err.log }
              exit 1
            }
          }
          Write-Host "[probe] Process still running after 15s but didn't bind"
          if (Test-Path probe_out.log) { Write-Host "--- stdout ---"; Get-Content probe_out.log }
          if (Test-Path probe_err.log) { Write-Host "--- stderr ---"; Get-Content probe_err.log }
          Stop-Process -Id $proc.Id -Force 2>$null
          exit 1

      - name: Dump launcher trace
        if: always()
        shell: pwsh
        run: |
          $tracePath = Join-Path $env:TEMP "boxcutter-launcher-trace.txt"
          if (Test-Path $tracePath) {
            Write-Host "--- launcher trace ---"
            Get-Content $tracePath
          } else {
            Write-Host "--- NO LAUNCHER TRACE FILE — bundle did not execute our code ---"
          }

      - name: Layer 3 — Playwright UI contract against bundle
        env:
          BOXCUTTER_BUNDLE_EXE: ${{ env.BOXCUTTER_EXE }}
          BOXCUTTER_TESTING: "1"
        shell: pwsh
        run: |
          pytest tests/bundle/ui/ -v --tb=short

  # ---------------------------------------------------------------------------
  # macOS smoke: mount the .dmg, copy the .app, run all 3 layers.
  # ---------------------------------------------------------------------------
  macos-smoke:
    needs: resolve-source-run
    if: needs.resolve-source-run.outputs.should_run == 'true'
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install test dependencies
        run: |
          pip install --no-cache-dir pytest playwright mutagen
          playwright install chromium

      # Smoke against the unpacked .app bundle, not via DMG mount. Faster
      # and bypasses any DMG-mount quirks.
      - name: Download unpacked macOS bundle
        uses: actions/download-artifact@v4
        with:
          pattern: BoxCutter-bundle-macos-*
          path: bundle
          run-id: ${{ needs.resolve-source-run.outputs.source_run_id }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          merge-multiple: true

      - name: Reconstitute .app bundle (artifact download flattens .app dir)
        run: |
          # actions/download-artifact extracts a .app directory's contents
          # but loses the .app wrapper. Wrap it back so macOS treats it as
          # an app bundle and the executable bit is preserved.
          if [ -d "bundle/Contents" ]; then
            mkdir -p /tmp/BoxCutter.app
            cp -R bundle/* /tmp/BoxCutter.app/
          else
            # Already wrapped or contains a top-level dir
            inner=$(find bundle -maxdepth 2 -name "Contents" -type d | head -1)
            parent=$(dirname "$inner")
            cp -R "$parent" /tmp/BoxCutter.app
          fi
          chmod +x /tmp/BoxCutter.app/Contents/MacOS/BoxCutter
          ls -la /tmp/BoxCutter.app/Contents/MacOS/

      - name: Locate bundle exe + scripts inside .app
        run: |
          export BOXCUTTER_APP=/tmp/BoxCutter.app
          exe="$BOXCUTTER_APP/Contents/MacOS/BoxCutter"
          if [ ! -x "$exe" ]; then
            echo "BoxCutter exe not found or not executable at $exe"
            ls -la "$BOXCUTTER_APP/Contents/MacOS"
            exit 1
          fi
          # PyInstaller .app layout: data files live under Contents/Resources/
          # in older versions, Contents/Frameworks/ in newer. Search both.
          scripts=""
          for candidate in \
              "$BOXCUTTER_APP/Contents/Resources/scripts" \
              "$BOXCUTTER_APP/Contents/Frameworks/scripts" \
              "$BOXCUTTER_APP/Contents/MacOS/scripts" \
              "$BOXCUTTER_APP/Contents/Resources/_internal/scripts" \
              "$BOXCUTTER_APP/Contents/MacOS/_internal/scripts"; do
            if [ -d "$candidate" ]; then scripts="$candidate"; break; fi
          done
          if [ -z "$scripts" ]; then
            echo "could not locate scripts/ inside .app — dumping layout:"
            find "$BOXCUTTER_APP" -name "scripts" -type d
            find "$BOXCUTTER_APP" -name "strip_comment_urls.py" -type f
            exit 1
          fi
          echo "Bundle exe: $exe"
          echo "Bundle scripts: $scripts"
          echo "BOXCUTTER_EXE=$exe" >> "$GITHUB_ENV"
          echo "BUNDLED_SCRIPTS=$scripts" >> "$GITHUB_ENV"

      - name: Layer 1 — verify_imports against bundle
        # Absolute path — the launcher does os.chdir(_MEIPASS) before
        # resolving sys.argv[1], so a relative path resolves into the
        # bundle's tempdir and fails with "can't find __main__".
        run: |
          script="$(realpath tests/bundle/verify_imports.py)"
          "$BOXCUTTER_EXE" "$script"

      - name: Layer 2 — run_all_scripts against bundle
        run: |
          python "$(realpath tests/bundle/run_all_scripts.py)" \
            --bundle-exe "$BOXCUTTER_EXE" \
            --scripts-dir "$BUNDLED_SCRIPTS" \
            --fixtures-dir "$(realpath tests/bundle/fixtures)"

      - name: Probe — does BoxCutter.app start in TESTING mode?
        # If this fails, Layer 3 will fail too. Surface the root cause here
        # rather than letting Layer 3 give a generic 'server did not start'.
        run: |
          set +e
          export BOXCUTTER_PORT=12345
          export BOXCUTTER_TESTING=1
          "$BOXCUTTER_EXE" > /tmp/probe_out.log 2> /tmp/probe_err.log &
          pid=$!
          for i in $(seq 1 15); do
            sleep 1
            if curl -fs http://127.0.0.1:12345/ > /dev/null 2>&1; then
              echo "[probe] OK — server responded on attempt $i"
              kill $pid 2>/dev/null
              wait $pid 2>/dev/null
              exit 0
            fi
            if ! kill -0 $pid 2>/dev/null; then
              echo "[probe] Process exited before binding port"
              echo "--- stdout ---"; cat /tmp/probe_out.log
              echo "--- stderr ---"; cat /tmp/probe_err.log
              exit 1
            fi
          done
          echo "[probe] Process still running after 15s but didn't bind"
          echo "--- stdout ---"; cat /tmp/probe_out.log
          echo "--- stderr ---"; cat /tmp/probe_err.log
          echo "--- ps ---"; ps -ef | grep -i boxcutter | grep -v grep || true
          kill $pid 2>/dev/null
          exit 1

      - name: Dump launcher trace
        if: always()
        run: |
          if [ -f /tmp/boxcutter-launcher-trace.txt ]; then
            echo "--- launcher trace ---"
            cat /tmp/boxcutter-launcher-trace.txt
          else
            echo "--- NO LAUNCHER TRACE FILE — bundle did not execute our code ---"
          fi

      - name: Layer 3 — Playwright UI contract against bundle
        env:
          BOXCUTTER_BUNDLE_EXE: ${{ env.BOXCUTTER_EXE }}
          BOXCUTTER_TESTING: "1"
        run: |
          pytest tests/bundle/ui/ -v --tb=short
