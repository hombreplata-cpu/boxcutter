name: CI

on:
  push:
    branches: ["**"]
  pull_request:
    branches: [main]

# Cancel in-progress runs for the same branch/PR when a new commit arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ---------------------------------------------------------------------------
  # Lint — Ruff linter + format check
  # No install needed; runs on ubuntu-latest for speed.
  # Violations appear as inline annotations on the PR diff.
  # ---------------------------------------------------------------------------
  lint:
    name: Lint (Ruff)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install Ruff
        run: pip install ruff==0.4.4

      - name: Ruff — lint check
        run: ruff check . --output-format github

      - name: Ruff — format check
        run: ruff format --check .

  # ---------------------------------------------------------------------------
  # Security — pip-audit CVE scan + Bandit SAST
  # pip-audit: hard fail on any known CVE in deps or their transitive tree.
  # Bandit: starts with --exit-zero for initial triage; remove it after triage
  #         to turn it into a hard gate.
  # ---------------------------------------------------------------------------
  security:
    name: Security (pip-audit + Bandit)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install security tools
        # bandit pinned to 1.9.4 — same major version as the CI baseline file.
        # If you bump this, also regenerate tools/bandit-baseline.json with the
        # new version (different versions produce different finding IDs and
        # the baseline match would silently break).
        run: pip install pip-audit==2.7.3 "bandit[toml]==1.9.4"

      - name: pip-audit — dependency CVE scan
        run: pip-audit -r requirements.txt --progress-spinner off

      - name: Bandit — SAST scan (medium+ severity, hard fail)
        # Any medium-or-higher severity finding fails the job.
        run: |
          bandit -r app.py scripts/ -ll -f json -o bandit-report.json
          bandit -r app.py scripts/ -ll

      - name: Bandit — low-severity regression gate (count must not increase)
        # We can't use bandit --baseline (filename matching is
        # platform-specific: ./app.py on Linux vs .\app.py on Windows).
        # Instead, count LOW findings and fail if the count exceeds the
        # pinned threshold. Cross-platform safe. See
        # tools/bandit_low_gate.py for the threshold and rationale.
        run: python tools/bandit_low_gate.py

      - name: Upload Bandit report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 30

  # ---------------------------------------------------------------------------
  # Build — dependency install + syntax check
  # Runs on both windows-latest and macos-latest.
  # --no-deps avoids transitive dep failures while still proving the packages
  # exist on PyPI and version constraints resolve.
  # py_compile verifies every .py file has valid syntax.
  # ---------------------------------------------------------------------------
  build:
    name: Build (install + syntax check) [${{ matrix.os }}]
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install direct dependencies
        run: pip install --no-deps -r requirements.txt

      - name: Syntax check — compile all Python files (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $files = Get-ChildItem -Recurse -Filter "*.py" | Select-Object -ExpandProperty FullName
          foreach ($f in $files) {
            python -m py_compile $f
            if ($LASTEXITCODE -ne 0) {
              Write-Error "Syntax error in: $f"
              exit 1
            }
          }
          Write-Host "All $($files.Count) Python files passed syntax check."

      - name: Syntax check — compile all Python files (macOS/Linux)
        if: runner.os != 'Windows'
        run: |
          find . -name "*.py" -not -path "./.venv/*" | xargs -I{} python -m py_compile {}

  # ---------------------------------------------------------------------------
  # Test — pytest unit + integration tests
  # Runs on both windows-latest and macos-latest.
  # pyrekordbox DB calls are mocked so no real master.db is needed.
  # ---------------------------------------------------------------------------
  test:
    name: Test (pytest) [${{ matrix.os }}]
    needs: build
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [windows-latest, macos-latest]

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install all dependencies
        run: pip install --no-cache-dir -r requirements.txt -r requirements-dev.txt

      - name: Run pytest
        # tests/bundle/ exercises the FROZEN bundle and runs in a separate
        # bundle-smoke workflow (PR 6). Excluded here so this fast unit-test
        # job stays fast and doesn't try to start a Flask server.
        run: pytest tests/ --ignore=tests/e2e --ignore=tests/bundle -v --tb=short --cov=scripts --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-${{ matrix.os }}
          path: coverage.xml
          retention-days: 30

  # ---------------------------------------------------------------------------
  # E2E — Playwright browser tests against a real running Flask server.
  # Runs on ubuntu-latest (headless Chromium). No real DB needed — strip_comments
  # and setup tests use temp directories and an empty config.
  # Integration tests (test_script_integration.py) are local-only and are
  # excluded here because they require master_test.db which is not committed.
  # ---------------------------------------------------------------------------
  e2e:
    name: E2E (Playwright)
    needs: build
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install all dependencies
        run: pip install --no-cache-dir -r requirements.txt -r requirements-dev.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Run E2E tests
        run: pytest tests/e2e/ -v --tb=short
