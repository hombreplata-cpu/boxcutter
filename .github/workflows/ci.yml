name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]
    paths-ignore:
      - '**.md'
      - 'docs/**'
      - 'CONTEXT.md'
      - 'BUILD_LOOP.md'
      - '.gitignore'
      - 'assets/screenshots/**'

# Cancel in-progress runs for the same branch/PR when a new commit arrives.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:

  # ---------------------------------------------------------------------------
  # Lint + Security — combined into one Ubuntu job to halve fixed overhead
  # (checkout + Python setup) compared to running them as separate jobs.
  # Runs ruff (lint + format check), pip-audit, bandit medium+, and the
  # bandit low-severity regression gate sequentially.
  # ---------------------------------------------------------------------------
  lint-security:
    name: Lint + Security
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Install tools
        # bandit pinned to 1.9.4 — same major version as the CI baseline file.
        # If you bump this, also regenerate tools/bandit-baseline.json with the
        # new version (different versions produce different finding IDs and
        # the baseline match would silently break).
        run: pip install ruff==0.15.12 pip-audit==2.7.3 "bandit[toml]==1.9.4"

      - name: Ruff — lint check
        run: ruff check . --output-format github

      - name: Ruff — format check
        run: ruff format --check .

      - name: pip-audit — dependency CVE scan
        run: pip-audit -r requirements.txt --progress-spinner off

      - name: Bandit — SAST scan (medium+ severity, hard fail)
        run: |
          bandit -r app.py scripts/ -ll -f json -o bandit-report.json
          bandit -r app.py scripts/ -ll

      - name: Bandit — low-severity regression gate (count must not increase)
        # We can't use bandit --baseline (filename matching is
        # platform-specific: ./app.py on Linux vs .\app.py on Windows).
        # Instead, count LOW findings and fail if the count exceeds the
        # pinned threshold. Cross-platform safe. See
        # tools/bandit_low_gate.py for the threshold and rationale.
        run: python tools/bandit_low_gate.py

      - name: Upload Bandit report
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: bandit-report
          path: bandit-report.json
          retention-days: 7

  # ---------------------------------------------------------------------------
  # Test — pytest unit + integration tests, plus an early syntax check.
  # Windows-only on PR / main pushes. macOS coverage is exercised by
  # build-test-artifacts.yml + bundle-smoke.yml during pre-release (cut
  # via workflow_dispatch) and on tag push — that's where the historical
  # Mac regressions (#102, #109) are caught.
  # pyrekordbox DB calls are mocked so no real master.db is needed.
  # ---------------------------------------------------------------------------
  test:
    name: Test (pytest) [windows-latest]
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install all dependencies
        run: pip install --no-cache-dir -r requirements.txt -r requirements-dev.txt

      - name: Syntax check — compile all Python files
        shell: pwsh
        run: |
          $files = Get-ChildItem -Recurse -Filter "*.py" | Select-Object -ExpandProperty FullName
          foreach ($f in $files) {
            python -m py_compile $f
            if ($LASTEXITCODE -ne 0) {
              Write-Error "Syntax error in: $f"
              exit 1
            }
          }
          Write-Host "All $($files.Count) Python files passed syntax check."

      - name: Generate integration test fixture
        # Bootstraps tests/fixtures/master_test.db from pyrekordbox's own
        # schema definitions — no Rekordbox install required, no SQLCipher
        # key required, no personal data committed. Lets
        # test_script_integration.py run on every CI runner instead of
        # silently skipping.
        run: python tests/fixtures/generate_master_test_db.py

      - name: Run pytest
        # tests/bundle/ exercises the FROZEN bundle and runs in a separate
        # bundle-smoke workflow. Excluded here so this fast unit-test job
        # stays fast and doesn't try to start a Flask server.
        run: pytest tests/ --ignore=tests/e2e --ignore=tests/bundle -v --tb=short --cov=scripts --cov-report=xml

      - name: Upload coverage
        uses: actions/upload-artifact@v7
        if: always()
        with:
          name: coverage-windows
          path: coverage.xml
          retention-days: 7

  # ---------------------------------------------------------------------------
  # E2E — Playwright browser tests against a real running Flask server.
  # Runs on ubuntu-latest (headless Chromium). No real DB needed — strip_comments
  # and setup tests use temp directories and an empty config.
  # Integration tests (test_script_integration.py) are local-only and are
  # excluded here because they require master_test.db which is not committed.
  # ---------------------------------------------------------------------------
  e2e:
    name: E2E (Playwright)
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
          cache: pip

      - name: Upgrade pip
        run: python -m pip install --upgrade pip

      - name: Install all dependencies
        run: pip install --no-cache-dir -r requirements.txt -r requirements-dev.txt

      - name: Install Playwright browsers
        run: playwright install --with-deps chromium

      - name: Run E2E tests
        run: pytest tests/e2e/ -v --tb=short
