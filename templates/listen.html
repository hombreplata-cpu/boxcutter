<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>BoxCutter — listen</title>
  <style>
    :root {
      --bg:      #0d1117;
      --panel:   #161b22;
      --hover:   #21262d;
      --border:  #30363d;
      --accent:  #00e5ff;
      --text:    #e6edf3;
      --dim:     #7d8590;
      --green:   #3fb950;
      --red:     #f85149;
      --safe-b:  env(safe-area-inset-bottom, 0px);
    }

    * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }

    html, body {
      height: 100%;
      background: var(--bg);
      color: var(--text);
      font-family: 'Avenir Next', Avenir, 'Century Gothic', sans-serif;
      overflow: hidden;
    }

    /* ── App shell ───────────────────────────────────────────────── */
    #app {
      display: flex;
      flex-direction: column;
      height: 100%;
      height: 100dvh;
    }

    /* ── Header ──────────────────────────────────────────────────── */
    #header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      padding-top: calc(14px + env(safe-area-inset-top, 0px));
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
      min-height: 56px;
    }

    #back-btn {
      background: none;
      border: none;
      color: var(--accent);
      font-size: 20px;
      cursor: pointer;
      padding: 4px 8px 4px 0;
      display: none;
      line-height: 1;
    }

    #header-title {
      font-size: 16px;
      font-weight: 600;
      flex: 1;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    #shuffle-btn {
      background: none;
      border: none;
      color: var(--dim);
      font-size: 18px;
      cursor: pointer;
      padding: 4px;
      display: none;
      transition: color 0.15s;
    }
    #shuffle-btn.on { color: var(--accent); }

    #logout-btn {
      background: none;
      border: none;
      color: var(--dim);
      font-size: 13px;
      cursor: pointer;
      padding: 4px 0 4px 8px;
      font-family: inherit;
    }

    /* ── Content area ────────────────────────────────────────────── */
    #content {
      flex: 1;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      overscroll-behavior: contain;
    }

    /* ── Playlist tree ───────────────────────────────────────────── */
    .tree-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 14px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
      user-select: none;
    }
    .tree-item:active { background: var(--hover); }

    .tree-icon { font-size: 16px; flex-shrink: 0; }
    .tree-name { font-size: 15px; flex: 1; }
    .tree-chevron { color: var(--dim); font-size: 13px; flex-shrink: 0; }

    .tree-folder-children {
      padding-left: 32px;
      border-left: 2px solid var(--border);
      margin-left: 16px;
    }
    .tree-folder-children.collapsed { display: none; }

    /* ── Track list ──────────────────────────────────────────────── */
    .track-item {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 16px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      transition: background 0.1s;
      user-select: none;
    }
    .track-item:active { background: var(--hover); }
    .track-item.playing { background: rgba(0, 229, 255, 0.06); }
    .track-item.playing .track-title { color: var(--accent); }

    .track-idx {
      font-size: 12px;
      color: var(--dim);
      width: 22px;
      text-align: right;
      flex-shrink: 0;
    }
    .track-item.playing .track-idx { color: var(--accent); }

    .track-info { flex: 1; min-width: 0; }
    .track-title {
      font-size: 14px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .track-meta {
      font-size: 12px;
      color: var(--dim);
      margin-top: 3px;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .track-dur {
      font-size: 12px;
      color: var(--dim);
      flex-shrink: 0;
    }

    /* ── Mini-player ─────────────────────────────────────────────── */
    #mini-player {
      display: none;
      flex-shrink: 0;
      background: var(--panel);
      border-top: 1px solid var(--border);
      padding: 10px 16px;
      padding-bottom: calc(10px + var(--safe-b));
      cursor: pointer;
    }

    .mini-row {
      display: flex;
      align-items: center;
      gap: 12px;
    }

    .mini-art {
      width: 40px;
      height: 40px;
      background: var(--hover);
      border-radius: 6px;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 18px;
      flex-shrink: 0;
    }

    .mini-info { flex: 1; min-width: 0; }
    .mini-title {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }
    .mini-artist {
      font-size: 11px;
      color: var(--dim);
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
    }

    .mini-controls {
      display: flex;
      align-items: center;
      gap: 8px;
      flex-shrink: 0;
    }

    .mini-btn {
      background: none;
      border: none;
      color: var(--text);
      font-size: 22px;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
      transition: color 0.1s;
    }
    .mini-btn:active { color: var(--accent); }
    .mini-btn.dim { color: var(--dim); font-size: 18px; }

    .mini-seekbar {
      height: 2px;
      background: var(--border);
      border-radius: 1px;
      margin-top: 8px;
      overflow: hidden;
    }
    .mini-seekfill {
      height: 100%;
      background: var(--accent);
      border-radius: 1px;
      width: 0%;
      transition: width 0.5s linear;
    }

    /* ── Full player sheet ───────────────────────────────────────── */
    #player-sheet {
      position: fixed;
      inset: 0;
      background: var(--bg);
      display: flex;
      flex-direction: column;
      transform: translateY(100%);
      transition: transform 0.35s cubic-bezier(0.32, 0.72, 0, 1);
      z-index: 100;
    }
    #player-sheet.open { transform: translateY(0); }

    .sheet-header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      padding-top: calc(16px + env(safe-area-inset-top, 0px));
      flex-shrink: 0;
    }

    .sheet-close {
      background: none;
      border: none;
      color: var(--dim);
      font-size: 24px;
      cursor: pointer;
      padding: 4px;
      line-height: 1;
    }

    .sheet-playlist {
      font-size: 12px;
      color: var(--dim);
      text-transform: uppercase;
      letter-spacing: 0.08em;
    }

    .sheet-body {
      flex: 1;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: flex-start;
      padding: 12px 24px 0;
      gap: 0;
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
    }

    .sheet-art {
      width: min(160px, 42vw);
      height: min(160px, 42vw);
      background: var(--panel);
      border-radius: 14px;
      border: 1px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 52px;
      flex-shrink: 0;
      margin-bottom: 16px;
    }

    .sheet-title {
      font-size: 20px;
      font-weight: 700;
      text-align: center;
      width: 100%;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      margin-bottom: 6px;
    }

    .sheet-artist {
      font-size: 15px;
      color: var(--dim);
      text-align: center;
      margin-bottom: 6px;
    }

    .sheet-tags {
      font-size: 13px;
      color: var(--dim);
      display: flex;
      gap: 12px;
      margin-bottom: 16px;
      flex-wrap: wrap;
      justify-content: center;
    }

    .sheet-tag {
      background: var(--panel);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 2px 8px;
      font-size: 12px;
    }

    .sheet-seek {
      width: 100%;
      display: flex;
      flex-direction: column;
      gap: 4px;
      margin-bottom: 24px;
    }

    /* ── Waveform canvas ─────────────────────────────────────── */
    .sheet-waveform {
      width: 100%;
      margin-bottom: 8px;
    }

    #waveform-canvas {
      width: 100%;
      height: 80px;
      cursor: pointer;
      display: block;
      border-radius: 4px;
      touch-action: none;
      background: var(--bg);
    }

    /* ── Cue add button ──────────────────────────────────────── */
    .cue-add-btn {
      background: none;
      border: 1px solid var(--border);
      border-radius: 6px;
      color: var(--dim);
      font-size: 12px;
      font-family: inherit;
      cursor: pointer;
      padding: 6px 10px;
      line-height: 1;
      transition: color 0.1s, border-color 0.1s;
    }
    .cue-add-btn:active { color: var(--green); border-color: var(--green); }

    .seek-times {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--dim);
    }

    .sheet-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 24px;
      flex-shrink: 0;
      padding-bottom: calc(16px + var(--safe-b));
    }

    .ctrl-btn {
      background: none;
      border: none;
      color: var(--text);
      cursor: pointer;
      padding: 8px;
      line-height: 1;
      transition: color 0.1s, transform 0.1s;
      display: flex;
      align-items: center;
      justify-content: center;
    }
    .ctrl-btn:active { transform: scale(0.88); }
    .ctrl-btn.skip { font-size: 28px; color: var(--dim); }
    .ctrl-btn.skip:active { color: var(--text); }

    .play-btn {
      width: 64px;
      height: 64px;
      background: var(--accent);
      border-radius: 50%;
      border: none;
      color: var(--bg);
      font-size: 26px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s, transform 0.1s;
      flex-shrink: 0;
    }
    .play-btn:active { background: #0097a7; transform: scale(0.93); }

    /* ── Track action sheet ─────────────────────────────────────── */
    #action-sheet-backdrop {
      position: fixed;
      inset: 0;
      background: rgba(0,0,0,0.5);
      z-index: 200;
      display: none;
      opacity: 0;
      transition: opacity 0.25s;
    }
    #action-sheet-backdrop.open { display: block; opacity: 1; }

    #action-sheet {
      position: fixed;
      bottom: 0;
      left: 0;
      right: 0;
      background: var(--panel);
      border-top: 1px solid var(--border);
      border-radius: 16px 16px 0 0;
      z-index: 201;
      transform: translateY(100%);
      transition: transform 0.3s cubic-bezier(0.32,0.72,0,1);
      max-height: 80dvh;
      display: flex;
      flex-direction: column;
      padding-bottom: env(safe-area-inset-bottom, 0px);
    }
    #action-sheet.open { transform: translateY(0); }

    .as-handle {
      width: 36px;
      height: 4px;
      background: var(--border);
      border-radius: 2px;
      margin: 10px auto 0;
      flex-shrink: 0;
    }

    .as-title {
      font-size: 13px;
      font-weight: 600;
      white-space: nowrap;
      overflow: hidden;
      text-overflow: ellipsis;
      text-align: center;
      padding: 10px 20px 0;
      color: var(--dim);
      flex-shrink: 0;
    }

    .as-body {
      overflow-y: auto;
      -webkit-overflow-scrolling: touch;
      padding: 0 0 16px;
    }

    .as-section-label {
      font-size: 11px;
      text-transform: uppercase;
      letter-spacing: 0.08em;
      color: var(--dim);
      padding: 14px 20px 6px;
    }

    /* Stars */
    .as-stars {
      display: flex;
      justify-content: center;
      gap: 6px;
      padding: 6px 20px 10px;
    }
    .star-btn {
      background: none;
      border: none;
      font-size: 28px;
      cursor: pointer;
      color: var(--border);
      padding: 4px;
      line-height: 1;
      transition: color 0.1s, transform 0.1s;
    }
    .star-btn:active { transform: scale(0.85); }
    .star-btn.lit { color: #f5c518; }

    /* Tag rows / playlist rows */
    .as-row {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 13px 20px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      user-select: none;
    }
    .as-row:active { background: var(--hover); }
    .as-row-name { flex: 1; font-size: 14px; }
    .as-row-check {
      width: 20px;
      height: 20px;
      border-radius: 50%;
      border: 2px solid var(--border);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      font-size: 12px;
      color: var(--bg);
    }
    .as-row.checked .as-row-check {
      background: var(--accent);
      border-color: var(--accent);
    }

    .as-empty {
      padding: 16px 20px;
      font-size: 13px;
      color: var(--dim);
    }

    .as-loading {
      padding: 16px 20px;
      font-size: 13px;
      color: var(--dim);
    }

    /* ── Action sheet waveform + controls ───────────────────────── */
    .as-waveform {
      padding: 0 20px;
      margin-bottom: 6px;
    }

    #as-waveform-canvas {
      width: 100%;
      height: 56px;
      cursor: pointer;
      display: block;
      border-radius: 4px;
      touch-action: none;
      background: var(--bg);
    }

    .as-seek-times {
      display: flex;
      justify-content: space-between;
      font-size: 11px;
      color: var(--dim);
      padding: 3px 0 0;
    }

    .as-controls {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
      padding: 8px 20px 14px;
      border-bottom: 1px solid var(--border);
    }

    .as-ctrl-btn {
      background: none;
      border: none;
      color: var(--dim);
      font-size: 20px;
      cursor: pointer;
      padding: 6px;
      line-height: 1;
      transition: color 0.1s, transform 0.1s;
    }
    .as-ctrl-btn:active { color: var(--text); transform: scale(0.88); }

    .as-play-btn {
      width: 52px;
      height: 52px;
      background: var(--accent);
      border-radius: 50%;
      border: none;
      color: var(--bg);
      font-size: 22px;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: background 0.1s, transform 0.1s;
      flex-shrink: 0;
    }
    .as-play-btn:active { background: #0097a7; transform: scale(0.93); }

    /* ── RB warning banner ───────────────────────────────────────── */
    #rb-banner {
      display: none;
      background: #2e1a0e;
      border-bottom: 2px solid var(--red);
      padding: 10px 16px;
      font-size: 13px;
      color: var(--red);
      line-height: 1.5;
      flex-shrink: 0;
      animation: rb-pulse 2.5s ease-in-out infinite;
    }
    #rb-banner strong { color: #ff8a80; }
    @keyframes rb-pulse {
      0%, 100% { border-bottom-color: var(--red); }
      50%       { border-bottom-color: #ff8a80; }
    }

    /* ── Loading / error states ──────────────────────────────────── */
    /* Search bar */
    #search-bar {
      background: var(--panel);
      border-bottom: 1px solid var(--border);
      padding: 8px 12px;
      flex-shrink: 0;
    }

    #search-input {
      width: 100%;
      background: var(--hover);
      border: 1px solid var(--border);
      border-radius: 8px;
      color: var(--text);
      font-family: inherit;
      font-size: 14px;
      padding: 8px 12px;
      outline: none;
      -webkit-appearance: none;
    }
    #search-input::placeholder { color: var(--dim); }
    #search-input:focus { border-color: var(--accent); }

    .state-msg {
      padding: 48px 24px;
      text-align: center;
      font-size: 14px;
      color: var(--dim);
      line-height: 1.6;
    }

    .spinner {
      width: 28px;
      height: 28px;
      border: 3px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      margin: 0 auto 16px;
    }
    @keyframes spin { to { transform: rotate(360deg); } }

    /* ── Track loading bar ───────────────────────────────────────── */
    #track-load-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 3px;
      z-index: 1000;
      pointer-events: none;
      display: none;
    }
    #track-load-bar.loading {
      display: block;
      background: var(--border);
      overflow: hidden;
    }
    #track-load-bar.loading::after {
      content: '';
      display: block;
      height: 100%;
      width: 45%;
      background: var(--accent);
      border-radius: 0 2px 2px 0;
      animation: bar-slide 1.2s ease-in-out infinite;
    }
    @keyframes bar-slide {
      0%   { margin-left: -45%; }
      100% { margin-left: 100%; }
    }
    #track-load-bar.done {
      display: block;
      background: var(--accent);
      animation: bar-done 0.45s ease-out forwards;
    }
    @keyframes bar-done {
      0%   { opacity: 1; }
      55%  { opacity: 1; }
      100% { opacity: 0; }
    }
  </style>
</head>
<body>

<div id="track-load-bar"></div>

<div id="app">

  <!-- Rekordbox running warning (non-dismissible — clears automatically when RB closes) -->
  <div id="rb-banner">
    ⚠ <strong>Rekordbox is open on your PC.</strong> Library edits are disabled. Close Rekordbox, then
    <button id="rb-check-btn" onclick="manualRbCheck()" style="background:none;border:none;color:#ff8a80;font-family:inherit;font-size:inherit;font-weight:600;text-decoration:underline;cursor:pointer;padding:0;">check again</button>.
  </div>

  <!-- Header -->
  <div id="header">
    <button id="back-btn" onclick="goBack()">‹</button>
    <div id="header-title">My Library</div>
    <button id="shuffle-btn" onclick="toggleShuffle()" title="Shuffle">⇀</button>
    <button id="logout-btn" onclick="location.href='/listen/logout'">Sign out</button>
  </div>

  <!-- Search bar -->
  <div id="search-bar">
    <input id="search-input" type="search" placeholder="Search playlists…" oninput="onSearch(this.value)" autocomplete="off" autocorrect="off" spellcheck="false">
  </div>

  <!-- Scrollable content -->
  <div id="content">
    <div class="state-msg"><div class="spinner"></div>Loading your library…</div>
  </div>

  <!-- Mini-player bar -->
  <div id="mini-player" onclick="openSheet()">
    <div class="mini-row">
      <div class="mini-art">♪</div>
      <div class="mini-info">
        <div class="mini-title" id="mini-title">—</div>
        <div class="mini-artist" id="mini-artist">—</div>
      </div>
      <div class="mini-controls" onclick="event.stopPropagation()">
        <button class="mini-btn dim" onclick="prevTrack()">⏮</button>
        <button class="mini-btn" id="mini-play-btn" onclick="togglePlay()">▶</button>
        <button class="mini-btn dim" onclick="nextTrack()">⏭</button>
      </div>
    </div>
    <div class="mini-seekbar">
      <div class="mini-seekfill" id="mini-seekfill"></div>
    </div>
  </div>

</div>

<!-- Action sheet backdrop -->
<div id="action-sheet-backdrop" onclick="closeActionSheet()"></div>

<!-- Track action sheet -->
<div id="action-sheet">
  <div class="as-handle"></div>
  <div class="as-title" id="as-title">—</div>
  <div class="as-body">
    <!-- Waveform -->
    <div class="as-waveform">
      <canvas id="as-waveform-canvas"
              onclick="asWaveformSeek(event)"
              ontouchstart="asWaveformSeek(event)"></canvas>
      <div class="as-seek-times">
        <span id="as-time-cur">0:00</span>
        <span id="as-time-rem">—</span>
      </div>
    </div>

    <!-- Playback controls -->
    <div class="as-controls">
      <button class="as-ctrl-btn" onclick="prevTrack()">⏮</button>
      <button class="as-play-btn" id="as-play-btn" onclick="togglePlay()">▶</button>
      <button class="as-ctrl-btn" onclick="nextTrack()">⏭</button>
    </div>

    <div class="as-section-label">Rate</div>
    <div class="as-stars" id="as-stars">
      <button class="star-btn" onclick="setStar(1)">★</button>
      <button class="star-btn" onclick="setStar(2)">★</button>
      <button class="star-btn" onclick="setStar(3)">★</button>
      <button class="star-btn" onclick="setStar(4)">★</button>
      <button class="star-btn" onclick="setStar(5)">★</button>
    </div>

    <div class="as-section-label">Tags</div>
    <div id="as-tags-list"><div class="as-loading">Loading…</div></div>

    <div class="as-section-label">Add to Playlist</div>
    <div id="as-playlists-list"><div class="as-loading">Loading…</div></div>
  </div>
</div>

<!-- Full-screen player sheet -->
<div id="player-sheet">
  <div class="sheet-header">
    <button class="sheet-close" onclick="closeSheet()">⌄</button>
    <div class="sheet-playlist" id="sheet-playlist-name">—</div>
    <div style="width:32px"></div>
  </div>
  <div class="sheet-body">
    <div class="sheet-art">♪</div>
    <div class="sheet-title" id="sheet-title">—</div>
    <div class="sheet-artist" id="sheet-artist">—</div>
    <div class="sheet-tags" id="sheet-tags"></div>
    <div class="sheet-waveform">
      <canvas id="waveform-canvas"
              onclick="waveformSeek(event)"
              ontouchstart="waveformSeek(event)"></canvas>
      <div class="seek-times">
        <span id="time-cur">0:00</span>
        <span id="time-rem">—</span>
      </div>
    </div>
    <div class="sheet-controls">
      <button class="ctrl-btn skip" onclick="prevTrack()">⏮</button>
      <button class="play-btn" id="sheet-play-btn" onclick="togglePlay()">▶</button>
      <button class="ctrl-btn skip" onclick="nextTrack()">⏭</button>
      <button class="cue-add-btn" onclick="addCue()" title="Add cue at current time">+ Cue</button>
    </div>
  </div>
</div>

<!-- Hidden audio element -->
<audio id="audio" preload="auto"></audio>

<script>
// ── State ──────────────────────────────────────────────────────────────────
let tree       = [];          // full playlist tree
let tracks     = [];          // tracks in current playlist
let trackIdx   = -1;          // currently playing track index
let shuffle    = false;
let shuffleOrder = [];        // shuffled index array
let shufflePos   = 0;
let currentPlaylistName = '';
let currentView = 'playlists'; // 'playlists' | 'tracks'
let searchQuery  = '';         // current search filter
let actionSheetOpen = false;

// Waveform & cues
let waveformCache   = {};     // trackId → Float32Array (800 samples) | null
let waveformLoading = false;
let cuePoints       = [];     // [{time_ms, source:'rb'|'session', id}]

const audio = document.getElementById('audio');

// Replace the initial history entry so popstate can distinguish in-app nav
history.replaceState({view: 'playlists'}, '');

// ── Rekordbox lock ─────────────────────────────────────────────────────────
// Latches true when RB is detected open; persists in sessionStorage so
// navigating playlists doesn't silently reset it. Clears automatically
// when polling confirms RB has closed.

let rbLocked = sessionStorage.getItem('rb_locked') === 'true';

function setRbLocked(locked) {
  rbLocked = locked;
  sessionStorage.setItem('rb_locked', locked ? 'true' : 'false');
  document.getElementById('rb-banner').style.display = locked ? 'block' : 'none';
}

// Restore persisted lock state immediately on page load
if (rbLocked) document.getElementById('rb-banner').style.display = 'block';

function pollRekordboxStatus() {
  return fetch('/api/rekordbox_status')
    .then(r => r.json())
    .then(data => {
      if (data.running) setRbLocked(true);
      else if (rbLocked) setRbLocked(false);
    })
    .catch(() => {});  // Network error — leave lock state unchanged
}

function manualRbCheck() {
  const btn = document.getElementById('rb-check-btn');
  btn.textContent = 'checking…';
  btn.disabled = true;
  pollRekordboxStatus().finally(() => {
    if (rbLocked) {
      btn.textContent = 'check again';
      btn.disabled = false;
    }
  });
}

// Poll every 30 s only while the tab is visible — iOS suspends timers when
// backgrounded anyway, but this makes the intent explicit and avoids waking
// the network stack while the screen is off.
setInterval(() => {
  if (document.visibilityState === 'visible') pollRekordboxStatus();
}, 30_000);

// Guard for all future write operations (ratings, playlist edits, tags, etc.)
// Returns true if safe to proceed; returns false and surfaces a reason if not.
function checkEditAllowed() {
  if (rbLocked) {
    alert('Rekordbox is open on your PC.\n\nClose it first — edits cannot be written to the database while Rekordbox has it locked.');
    return false;
  }
  return true;
}

// ── Initialisation ─────────────────────────────────────────────────────────
async function init() {
  try {
    const res = await fetch('/api/listen/tree');
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    tree = data.tree || [];
    if (data.rekordbox_running) setRbLocked(true);
    renderPlaylists();
  } catch (e) {
    showError('Could not load your library.<br>' + esc(e.message));
  }
}

// ── Search ─────────────────────────────────────────────────────────────────
function onSearch(val) {
  searchQuery = val.trim();
  if (currentView === 'playlists') renderPlaylists();
  else if (currentView === 'tracks') renderTracks();
}

function flattenTree(nodes, out = []) {
  for (const n of nodes) {
    if (n.type === 'folder') flattenTree(n.children || [], out);
    else out.push(n);
  }
  return out;
}

// ── Playlist tree rendering ────────────────────────────────────────────────
function renderPlaylists() {
  currentView = 'playlists';
  document.getElementById('header-title').textContent = 'My Library';
  document.getElementById('back-btn').style.display = 'none';
  document.getElementById('shuffle-btn').style.display = 'none';
  document.getElementById('logout-btn').style.display = '';
  document.getElementById('search-input').placeholder = 'Search playlists…';

  const el = document.getElementById('content');
  const q = searchQuery.toLowerCase();

  // "All Tracks" is always pinned at the top
  const allTracksItem = `
    <div class="tree-item" onclick="openAllTracks()">
      <span class="tree-icon">🎵</span>
      <span class="tree-name">All Tracks</span>
      <span class="tree-chevron">›</span>
    </div>`;

  if (!tree.length) {
    el.innerHTML = allTracksItem + '<div class="state-msg" style="padding-top:32px">No playlists found in your Rekordbox library.</div>';
    return;
  }

  if (q) {
    // Flat filtered list of matching playlists
    const matching = flattenTree(tree).filter(n => n.name.toLowerCase().includes(q));
    let html = allTracksItem;
    if (!matching.length) {
      html += '<div class="state-msg" style="padding-top:32px">No playlists match your search.</div>';
    } else {
      for (const n of matching) {
        const icon = n.smart ? '⚡' : '♫';
        html += `
          <div class="tree-item" data-name="${esc(n.name)}" onclick="openPlaylist(${n.id}, this.dataset.name)">
            <span class="tree-icon" style="font-size:13px;color:var(--dim)">${icon}</span>
            <span class="tree-name">${esc(n.name)}</span>
            <span class="tree-chevron">›</span>
          </div>`;
      }
    }
    el.innerHTML = html;
    return;
  }

  el.innerHTML = allTracksItem + renderTreeNodes(tree);
}

function renderTreeNodes(nodes) {
  let html = '';
  for (const node of nodes) {
    if (node.type === 'folder') {
      html += `
        <div class="tree-item" onclick="toggleFolder(this)">
          <span class="tree-icon">📁</span>
          <span class="tree-name">${esc(node.name)}</span>
          <span class="tree-chevron" style="color:var(--dim);font-size:11px">▸</span>
        </div>
        <div class="tree-folder-children collapsed">
          ${renderTreeNodes(node.children || [])}
        </div>`;
    } else {
      const icon = node.smart ? '⚡' : '♫';
      html += `
        <div class="tree-item" data-name="${esc(node.name)}" onclick="openPlaylist(${node.id}, this.dataset.name)">
          <span class="tree-icon" style="font-size:13px;color:var(--dim)">${icon}</span>
          <span class="tree-name">${esc(node.name)}</span>
          <span class="tree-chevron">›</span>
        </div>`;
    }
  }
  return html;
}

function toggleFolder(el) {
  const children = el.nextElementSibling;
  children.classList.toggle('collapsed');
  const chevron = el.querySelector('.tree-chevron');
  chevron.textContent = children.classList.contains('collapsed') ? '▸' : '▾';
}

// ── Track list ─────────────────────────────────────────────────────────────
function _enterTracksView(name) {
  history.pushState({view: 'tracks'}, '');
  currentPlaylistName = name;
  currentView = 'tracks';
  searchQuery = '';
  document.getElementById('search-input').value = '';
  document.getElementById('search-input').placeholder = 'Search tracks…';
  document.getElementById('header-title').textContent = name;
  document.getElementById('back-btn').style.display = '';
  document.getElementById('shuffle-btn').style.display = '';
  document.getElementById('logout-btn').style.display = 'none';
  document.getElementById('content').innerHTML = '<div class="state-msg"><div class="spinner"></div>Loading tracks…</div>';
  document.getElementById('sheet-playlist-name').textContent = name;
}

async function openPlaylist(pid, name) {
  _enterTracksView(name);
  try {
    const res = await fetch(`/api/listen/playlist/${pid}/tracks`);
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    if (data.smart_unavailable) {
      showError('Intelligent playlists are evaluated dynamically by Rekordbox and aren\'t stored in the database.<br><br>To browse this playlist, open it in Rekordbox on your PC.');
      return;
    }
    tracks = data.tracks || [];
    renderTracks();
  } catch (e) {
    showError('Could not load tracks.<br>' + esc(e.message));
  }
}

async function openAllTracks() {
  _enterTracksView('All Tracks');
  try {
    const res = await fetch('/api/listen/all-tracks');
    if (!res.ok) throw new Error(await res.text());
    const data = await res.json();
    tracks = data.tracks || [];
    renderTracks();
  } catch (e) {
    showError('Could not load tracks.<br>' + esc(e.message));
  }
}

function renderTracks() {
  document.getElementById('search-input').placeholder = 'Search tracks…';
  const q = searchQuery.toLowerCase();
  const filtered = q
    ? tracks.map((t, i) => ({ t, i })).filter(({ t }) =>
        (t.title || '').toLowerCase().includes(q) ||
        (t.artist || '').toLowerCase().includes(q))
    : tracks.map((t, i) => ({ t, i }));

  if (!filtered.length) {
    const msg = q ? 'No tracks match your search.' : 'This playlist is empty.';
    document.getElementById('content').innerHTML = `<div class="state-msg">${msg}</div>`;
    return;
  }
  let html = '';
  for (let pos = 0; pos < filtered.length; pos++) {
    const { t, i } = filtered[pos];
    const meta = [t.artist, t.bpm ? t.bpm + ' BPM' : '', t.key].filter(Boolean).join('  ·  ');
    const active = i === trackIdx;
    html += `
      <div class="track-item${active ? ' playing' : ''}" id="ti-${i}" onclick="openActionSheet(${i})">
        <div class="track-idx">${active ? '▶' : pos + 1}</div>
        <div class="track-info">
          <div class="track-title">${esc(t.title)}</div>
          ${meta ? `<div class="track-meta">${esc(meta)}</div>` : ''}
        </div>
        <div class="track-dur">${fmtDur(t.duration)}</div>
      </div>`;
  }
  document.getElementById('content').innerHTML = html;
}

function goBack() {
  history.back();
}

// Device/browser back button: intercept when in tracks view
window.addEventListener('popstate', (e) => {
  const state = e.state || {};
  if (state.view === 'playlists') {
    searchQuery = '';
    document.getElementById('search-input').value = '';
    renderPlaylists();
  }
});

// ── Playback ───────────────────────────────────────────────────────────────
function playTrack(idx) {
  const prevActionIdx = actionTrackIdx;
  trackIdx = idx;
  const t = tracks[idx];

  document.getElementById('mini-player').style.display = 'block';

  audio.src = `/api/stream/${t.id}`;
  audio.load();
  audio.play().catch(() => {});

  updateNowPlayingUI(t);
  renderTracks();

  // Reset and reload waveform + cues for the new track
  cuePoints = [];
  waveformLoading = false;
  drawWaveform();
  loadWaveformForTrack(t.id);
  loadCuesForTrack(t.id);

  // If action sheet is open and the track changed externally (next/prev),
  // refresh the action sheet content for the new track
  if (actionSheetOpen && prevActionIdx !== idx) {
    actionTrackIdx = idx;
    document.getElementById('as-title').textContent = t.title || '—';
    trackRating = ratingToStars(t.rating);
    renderStars(trackRating);
    trackTags = [];
    trackPlaylists = [];
    document.getElementById('as-tags-list').innerHTML = '<div class="as-loading">Loading…</div>';
    document.getElementById('as-playlists-list').innerHTML = '<div class="as-loading">Loading…</div>';
    setTimeout(resizeActionSheetWaveform, 50);
    Promise.allSettled([
      fetch(`/api/tracks/${t.id}/mytags`).then(r => r.json()),
      fetch(`/api/tracks/${t.id}/playlists`).then(r => r.json()),
    ]).then(([tagsRes, plRes]) => {
      trackTags     = tagsRes.status === 'fulfilled' && !tagsRes.value.error ? tagsRes.value : [];
      trackPlaylists = plRes.status === 'fulfilled'  && !plRes.value.error  ? plRes.value  : [];
      renderTagsList();
      renderPlaylistsList();
    });
  }
}

function updateNowPlayingUI(t) {
  const title  = t.title || '—';
  const artist = t.artist || '';
  const bpm    = t.bpm ? `${t.bpm} BPM` : '';
  const key    = t.key || '';

  document.getElementById('mini-title').textContent  = title;
  document.getElementById('mini-artist').textContent = artist || (bpm || key);

  document.getElementById('sheet-title').textContent  = title;
  document.getElementById('sheet-artist').textContent = artist;

  const tags = [bpm, key].filter(Boolean);
  document.getElementById('sheet-tags').innerHTML = tags.map(x => `<span class="sheet-tag">${esc(x)}</span>`).join('');
}

function togglePlay() {
  if (audio.paused) {
    audio.play().catch(() => {});
  } else {
    audio.pause();
  }
}

function nextTrack() {
  if (!tracks.length) return;
  if (shuffle) {
    shufflePos = (shufflePos + 1) % shuffleOrder.length;
    playTrack(shuffleOrder[shufflePos]);
  } else {
    playTrack((trackIdx + 1) % tracks.length);
  }
}

function prevTrack() {
  if (!tracks.length) return;
  // If more than 3 seconds in, restart; else go to previous
  if (audio.currentTime > 3) {
    audio.currentTime = 0;
    return;
  }
  if (shuffle) {
    shufflePos = (shufflePos - 1 + shuffleOrder.length) % shuffleOrder.length;
    playTrack(shuffleOrder[shufflePos]);
  } else {
    playTrack((trackIdx - 1 + tracks.length) % tracks.length);
  }
}

function toggleShuffle() {
  shuffle = !shuffle;
  const btn = document.getElementById('shuffle-btn');
  btn.classList.toggle('on', shuffle);
  if (shuffle) {
    shuffleOrder = [...Array(tracks.length).keys()];
    for (let i = shuffleOrder.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      [shuffleOrder[i], shuffleOrder[j]] = [shuffleOrder[j], shuffleOrder[i]];
    }
    shufflePos = shuffleOrder.indexOf(trackIdx);
    if (shufflePos < 0) shufflePos = 0;
  }
}

// ── Audio event listeners ──────────────────────────────────────────────────
audio.addEventListener('play', () => {
  document.getElementById('mini-play-btn').textContent  = '⏸';
  document.getElementById('sheet-play-btn').textContent = '⏸';
  document.getElementById('as-play-btn').textContent    = '⏸';
});

audio.addEventListener('pause', () => {
  document.getElementById('mini-play-btn').textContent  = '▶';
  document.getElementById('sheet-play-btn').textContent = '▶';
  document.getElementById('as-play-btn').textContent    = '▶';
});

audio.addEventListener('ended', () => nextTrack());

// ── Track loading bar ──────────────────────────────────────────────────────
const _loadBar = document.getElementById('track-load-bar');
function _barLoading() { _loadBar.className = 'loading'; }
function _barDone() {
  _loadBar.className = 'done';
  setTimeout(() => { if (_loadBar.className === 'done') _loadBar.className = ''; }, 450);
}
audio.addEventListener('loadstart', _barLoading);
audio.addEventListener('waiting',   _barLoading);
audio.addEventListener('canplay',   _barDone);
audio.addEventListener('playing',   _barDone);
audio.addEventListener('error',     () => { _loadBar.className = ''; });

audio.addEventListener('timeupdate', () => {
  const dur = audio.duration || 0;
  const cur = audio.currentTime || 0;
  const pct = dur ? (cur / dur) * 100 : 0;

  document.getElementById('mini-seekfill').style.width = pct + '%';

  const curStr = fmtDur(Math.floor(cur));
  const remStr = dur ? '-' + fmtDur(Math.max(0, Math.floor(dur - cur))) : '—';
  document.getElementById('time-cur').textContent = curStr;
  document.getElementById('time-rem').textContent = remStr;
  document.getElementById('as-time-cur').textContent = curStr;
  document.getElementById('as-time-rem').textContent = remStr;

  drawWaveform();
});

// ── Waveform ───────────────────────────────────────────────────────────────
function _drawWaveformToCanvas(canvas) {
  if (!canvas || !canvas.width) return;
  const ctx = canvas.getContext('2d');
  const W   = canvas.width;
  const H   = canvas.height;

  ctx.clearRect(0, 0, W, H);
  ctx.fillStyle = '#0d1117';
  ctx.fillRect(0, 0, W, H);

  const t = trackIdx >= 0 ? tracks[trackIdx] : null;
  const waveform = t ? waveformCache[t.id] : undefined;
  const dpr = window.devicePixelRatio || 1;

  // Check waveformLoading BEFORE the undefined guard so the loading
  // indicator shows while the fetch is in flight (cache entry is undefined
  // until the fetch resolves, so the old undefined-first check would exit
  // early and never render the loading state).
  if (waveformLoading) {
    ctx.fillStyle = '#7d8590';
    ctx.font = `${12 * dpr}px Avenir Next, Avenir, sans-serif`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('Loading waveform…', W / 2, H / 2);
    return;
  }

  if (waveform === undefined) return;  // no track loaded yet

  if (waveform === null) {
    ctx.fillStyle = '#7d8590';
    ctx.font = `${12 * dpr}px Avenir Next, Avenir, sans-serif`;
    ctx.textAlign    = 'center';
    ctx.textBaseline = 'middle';
    ctx.fillText('Waveform unavailable', W / 2, H / 2);
    return;
  }

  const dur   = audio.duration    || 0;
  const cur   = audio.currentTime || 0;
  const playX = dur ? Math.floor((cur / dur) * W) : 0;

  const N = waveform.length;
  let maxVal = 0.001;
  for (let i = 0; i < N; i++) if (waveform[i] > maxVal) maxVal = waveform[i];

  for (let i = 0; i < N; i++) {
    const x     = Math.floor(i / N * W);
    const nextX = Math.floor((i + 1) / N * W);
    const barW  = Math.max(1, nextX - x - 1);
    const barH  = Math.max(1, Math.floor((waveform[i] / maxVal) * H * 0.85));
    const y     = Math.floor((H - barH) / 2);
    ctx.fillStyle = x <= playX ? '#00e5ff' : '#30363d';
    ctx.fillRect(x, y, barW, barH);
  }

  // Playhead
  ctx.fillStyle = '#e6edf3';
  ctx.fillRect(Math.max(0, playX - 1), 0, 2, H);

  // Cue markers
  for (const cue of cuePoints) {
    if (!dur) continue;
    const cx    = Math.floor((cue.time_ms / 1000) / dur * W);
    const color = cue.source === 'rb' ? '#f5c518' : '#3fb950';
    ctx.fillStyle = color;
    ctx.fillRect(cx - 1, 0, 2, H);
    ctx.beginPath();
    ctx.moveTo(cx - 5, 0);
    ctx.lineTo(cx + 5, 0);
    ctx.lineTo(cx, 9);
    ctx.closePath();
    ctx.fill();
  }
}

function drawWaveform() {
  _drawWaveformToCanvas(document.getElementById('waveform-canvas'));
  _drawWaveformToCanvas(document.getElementById('as-waveform-canvas'));
}

function resizeWaveformCanvas() {
  const canvas = document.getElementById('waveform-canvas');
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const w   = canvas.offsetWidth || 300;
  canvas.width  = w * dpr;
  canvas.height = 80 * dpr;
  drawWaveform();
}

function resizeActionSheetWaveform() {
  const canvas = document.getElementById('as-waveform-canvas');
  if (!canvas) return;
  const dpr = window.devicePixelRatio || 1;
  const w   = canvas.offsetWidth || 300;
  canvas.width  = w * dpr;
  canvas.height = 56 * dpr;
  _drawWaveformToCanvas(canvas);
}

function asWaveformSeek(e) {
  e.preventDefault();
  const canvas  = document.getElementById('as-waveform-canvas');
  const rect    = canvas.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const pct     = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
  if (audio.duration) audio.currentTime = pct * audio.duration;
}

async function loadWaveformForTrack(trackId) {
  if (trackId in waveformCache) { drawWaveform(); return; }
  waveformLoading = true;
  drawWaveform();
  try {
    const res     = await fetch(`/api/stream/${trackId}`);
    const buf     = await res.arrayBuffer();
    const actx    = new (window.AudioContext || window.webkitAudioContext)();
    const decoded = await actx.decodeAudioData(buf);
    const ch      = decoded.getChannelData(0);
    const N       = 800;
    const block   = Math.floor(ch.length / N);
    const data    = new Float32Array(N);
    for (let i = 0; i < N; i++) {
      let sum = 0;
      for (let j = 0; j < block; j++) sum += Math.abs(ch[i * block + j]);
      data[i] = block ? sum / block : 0;
    }
    waveformCache[trackId] = data;
    actx.close();
  } catch {
    waveformCache[trackId] = null;
  }
  waveformLoading = false;
  drawWaveform();
}

async function loadCuesForTrack(trackId) {
  cuePoints = [];
  try {
    const r    = await fetch(`/api/tracks/${trackId}/cues`);
    const data = await r.json();
    if (Array.isArray(data)) {
      cuePoints = data
        .filter(c => c.time_ms >= 0)
        .map(c => ({ time_ms: c.time_ms, source: 'rb', id: c.id, comment: c.comment }));
    }
  } catch {}
  drawWaveform();
}

async function addCue() {
  const ms = Math.floor((audio.currentTime || 0) * 1000);
  const t  = trackIdx >= 0 ? tracks[trackIdx] : null;
  if (!t) return;

  const tempId = 'sess_' + Date.now();
  cuePoints.push({ time_ms: ms, source: 'session', id: tempId });
  drawWaveform();

  try {
    const r    = await fetch(`/api/tracks/${t.id}/cues`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({ time_ms: ms }),
    });
    const data = await r.json();
    if (data.ok) {
      const i = cuePoints.findIndex(c => c.id === tempId);
      if (i >= 0) cuePoints[i] = { time_ms: ms, source: 'rb', id: data.id };
      drawWaveform();
    }
  } catch { /* keep as session cue */ }
}

function waveformSeek(e) {
  e.preventDefault();
  const canvas  = document.getElementById('waveform-canvas');
  const rect    = canvas.getBoundingClientRect();
  const clientX = e.touches ? e.touches[0].clientX : e.clientX;
  const pct     = Math.max(0, Math.min(1, (clientX - rect.left) / rect.width));
  if (audio.duration) audio.currentTime = pct * audio.duration;
}

window.addEventListener('resize', () => {
  if (document.getElementById('player-sheet').classList.contains('open')) {
    resizeWaveformCanvas();
  }
});

// ── Player sheet ───────────────────────────────────────────────────────────
function openSheet() {
  document.getElementById('player-sheet').classList.add('open');
  setTimeout(resizeWaveformCanvas, 50);
}

function closeSheet() {
  document.getElementById('player-sheet').classList.remove('open');
}

// ── Helpers ────────────────────────────────────────────────────────────────
function fmtDur(secs) {
  if (!secs && secs !== 0) return '—';
  const m = Math.floor(secs / 60);
  const s = Math.floor(secs % 60).toString().padStart(2, '0');
  return `${m}:${s}`;
}

function esc(s) {
  if (!s && s !== 0) return '';
  return String(s)
    .replace(/&/g, '&amp;')
    .replace(/</g, '&lt;')
    .replace(/>/g, '&gt;')
    .replace(/"/g, '&quot;');
}

function showError(msg) {
  document.getElementById('content').innerHTML = `<div class="state-msg">${msg}</div>`;
}

// ── Media Session API (lock screen controls on iOS 16+) ───────────────────
audio.addEventListener('play', updateMediaSession);

function updateMediaSession() {
  if (!('mediaSession' in navigator) || trackIdx < 0) return;
  const t = tracks[trackIdx];
  if (!t) return;
  navigator.mediaSession.metadata = new MediaMetadata({
    title:  t.title  || '',
    artist: t.artist || '',
    album:  currentPlaylistName,
  });
  navigator.mediaSession.setActionHandler('previoustrack', prevTrack);
  navigator.mediaSession.setActionHandler('nexttrack',     nextTrack);
  navigator.mediaSession.setActionHandler('play',  () => audio.play());
  navigator.mediaSession.setActionHandler('pause', () => audio.pause());
}

// ── Action sheet ───────────────────────────────────────────────────────────
let actionTrackIdx = -1;
let allMyTags      = [];   // [{id, name, parent_id, attribute}]
let allPlaylists   = [];   // flattened [{id, name}] from tree
let trackTags      = [];   // [{assignment_id, tag_id}]
let trackPlaylists = [];   // [{playlist_id}]
let trackRating    = 0;    // 0-5 stars

function ratingToStars(rating) {
  const r = Number(rating);
  if (!r || r <= 0) return 0;
  return Math.min(5, Math.max(0, Math.round(r)));
}

function flattenPlaylists(nodes, out = []) {
  for (const n of nodes) {
    if (n.type === 'folder') flattenPlaylists(n.children || [], out);
    else out.push({ id: String(n.id), name: n.name });
  }
  return out;
}

async function openActionSheet(idx) {
  actionTrackIdx = idx;
  actionSheetOpen = true;

  const t = tracks[idx];
  document.getElementById('as-title').textContent = t.title || '—';
  document.getElementById('action-sheet-backdrop').classList.add('open');
  document.getElementById('action-sheet').classList.add('open');
  document.body.style.overflow = 'hidden';

  // Start playback for this track
  playTrack(idx);

  // Size action sheet canvas after it's painted
  setTimeout(resizeActionSheetWaveform, 50);

  // Reset state
  trackRating = 0;
  trackTags = [];
  trackPlaylists = [];
  renderStars(0);
  document.getElementById('as-tags-list').innerHTML = '<div class="as-loading">Loading…</div>';
  document.getElementById('as-playlists-list').innerHTML = '<div class="as-loading">Loading…</div>';

  // Display rating from cached track data immediately
  trackRating = ratingToStars(t.rating);
  renderStars(trackRating);

  // Fetch all my tags (cached after first load)
  if (!allMyTags.length) {
    try {
      const r = await fetch('/api/mytags');
      allMyTags = (await r.json()) || [];
    } catch { allMyTags = []; }
  }

  // Flatten playlists from already-loaded tree (cached)
  if (!allPlaylists.length) {
    allPlaylists = flattenPlaylists(tree);
  }

  // Fetch track's current tags and playlists in parallel
  const [tagsRes, plRes] = await Promise.allSettled([
    fetch(`/api/tracks/${t.id}/mytags`).then(r => r.json()),
    fetch(`/api/tracks/${t.id}/playlists`).then(r => r.json()),
  ]);

  trackTags     = tagsRes.status === 'fulfilled' && !tagsRes.value.error ? tagsRes.value : [];
  trackPlaylists = plRes.status === 'fulfilled'  && !plRes.value.error  ? plRes.value  : [];

  renderTagsList();
  renderPlaylistsList();
}

function closeActionSheet() {
  document.getElementById('action-sheet-backdrop').classList.remove('open');
  document.getElementById('action-sheet').classList.remove('open');
  document.body.style.overflow = '';
  actionSheetOpen = false;
  actionTrackIdx = -1;
}

// Stars
function renderStars(rating) {
  const btns = document.querySelectorAll('#as-stars .star-btn');
  btns.forEach((b, i) => b.classList.toggle('lit', i < rating));
}

async function setStar(star) {
  if (!checkEditAllowed()) return;
  const t = tracks[actionTrackIdx];
  if (!t) return;
  const newRating = (star === trackRating) ? 0 : star;  // tap same star to clear
  renderStars(newRating);
  trackRating = newRating;
  try {
    const r = await fetch(`/api/tracks/${t.id}/rating`, {
      method: 'POST',
      headers: {'Content-Type': 'application/json'},
      body: JSON.stringify({rating: newRating}),
    });
    if (r.ok) {
      // Update in-memory track so reopening the action sheet shows current rating
      tracks[actionTrackIdx].rating = newRating;
    }
  } catch { /* silent — UI already updated */ }
}

// Tags
function renderTagsList() {
  const assignedIds = new Set(trackTags.map(a => String(a.tag_id)));
  // Categories have no parent (parent_id is null); leaf tags point to their category.
  const parents  = allMyTags.filter(t => !t.parent_id);
  const children = allMyTags.filter(t =>  t.parent_id);

  if (!children.length) {
    document.getElementById('as-tags-list').innerHTML = '<div class="as-empty">No My Tags found.</div>';
    return;
  }

  // Group children by parent ID
  const byParent = {};
  for (const c of children) {
    const pid = String(c.parent_id);
    if (!byParent[pid]) byParent[pid] = [];
    byParent[pid].push(c);
  }

  function tagRow(tag) {
    const checked    = assignedIds.has(String(tag.id));
    const assignment = trackTags.find(a => String(a.tag_id) === String(tag.id));
    return `<div class="as-row${checked ? ' checked' : ''}" onclick="toggleTag('${tag.id}','${esc(tag.name)}','${assignment ? assignment.assignment_id : ''}')">
      <div class="as-row-name">${esc(tag.name)}</div>
      <div class="as-row-check">${checked ? '✓' : ''}</div>
    </div>`;
  }

  let html = '';
  // Render each parent category with its children
  for (const parent of parents.sort((a, b) => (a.seq || 0) - (b.seq || 0))) {
    const kids = byParent[String(parent.id)];
    if (!kids || !kids.length) continue;
    html += `<div class="as-section-label">${esc(parent.name)}</div>`;
    for (const tag of kids.sort((a, b) => (a.seq || 0) - (b.seq || 0))) {
      html += tagRow(tag);
    }
  }

  // Any orphaned children whose parent wasn't found
  const parentIds = new Set(parents.map(p => String(p.id)));
  for (const tag of children.filter(c => !parentIds.has(String(c.parent_id)))) {
    html += tagRow(tag);
  }

  document.getElementById('as-tags-list').innerHTML = html || '<div class="as-empty">No My Tags found.</div>';
}

async function toggleTag(tagId, tagName, assignmentId) {
  if (!checkEditAllowed()) return;
  const t = tracks[actionTrackIdx];
  if (!t) return;
  const isAssigned = trackTags.some(a => String(a.tag_id) === String(tagId));
  if (isAssigned && assignmentId) {
    // Remove
    trackTags = trackTags.filter(a => String(a.tag_id) !== String(tagId));
    renderTagsList();
    try {
      await fetch(`/api/tracks/${t.id}/mytags/${assignmentId}`, {method: 'DELETE'});
    } catch { /* silent */ }
  } else if (!isAssigned) {
    // Add
    try {
      const r = await fetch(`/api/tracks/${t.id}/mytags`, {
        method: 'POST',
        headers: {'Content-Type': 'application/json'},
        body: JSON.stringify({mytag_id: tagId}),
      });
      const data = await r.json();
      if (data.ok) {
        trackTags.push({assignment_id: data.assignment_id, tag_id: tagId, tag_name: tagName});
        renderTagsList();
      }
    } catch { /* silent */ }
  }
}

// Playlists
function renderPlaylistsList() {
  const inIds = new Set(trackPlaylists.map(p => String(p.playlist_id)));
  if (!allPlaylists.length) {
    document.getElementById('as-playlists-list').innerHTML = '<div class="as-empty">No playlists found.</div>';
    return;
  }
  let html = '';
  for (const pl of allPlaylists) {
    const checked = inIds.has(String(pl.id));
    html += `<div class="as-row${checked ? ' checked' : ''}" onclick="togglePlaylist('${pl.id}','${esc(pl.name)}')">
      <div class="as-row-name">${esc(pl.name)}</div>
      <div class="as-row-check">${checked ? '✓' : ''}</div>
    </div>`;
  }
  document.getElementById('as-playlists-list').innerHTML = html;
}

async function togglePlaylist(playlistId, playlistName) {
  if (!checkEditAllowed()) return;
  const t = tracks[actionTrackIdx];
  if (!t) return;
  const isIn = trackPlaylists.some(p => String(p.playlist_id) === String(playlistId));
  if (isIn) {
    trackPlaylists = trackPlaylists.filter(p => String(p.playlist_id) !== String(playlistId));
    renderPlaylistsList();
    try {
      await fetch(`/api/tracks/${t.id}/playlists/${playlistId}`, {method: 'DELETE'});
    } catch { /* silent */ }
  } else {
    trackPlaylists.push({playlist_id: playlistId, name: playlistName});
    renderPlaylistsList();
    try {
      await fetch(`/api/tracks/${t.id}/playlists/${playlistId}`, {method: 'POST'});
    } catch { /* silent */ }
  }
}

// ── Boot ───────────────────────────────────────────────────────────────────
init();
</script>
